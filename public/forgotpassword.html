<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header class="logged-out">
        <div>
            <section>          
                <a href="index.html" class="logo-wrapper"><h1>PerfectDate</h1>
                <img src="images/logo.svg" alt="PerfectDate Logo"></a> 
            </section>
            <div class="auth-buttons">
                 <a href="login.html" class="button high">Login</a>
                <a href="register.html" class="button medium">Register</a>
            </div>
        </div>
    </header>
    
    <main class="middle-page">
        <div class="app-container">
            
            <form class="login-form" id="forgot-form">

                <h1 class="page-title">Forgot Password</h1>

                <div class="login-div">
                    <label for="email">Email 
                        <input type="email" id="email" name="email" required>
                    </label>
                </div>
                
                <div class="login-actions">
                    <button type="submit" class="button high">Send Reset Email</button>
                </div>
            </form>

        </div>
    </main>

    <script type="module" src="script/forgotpassword.js"></script>

</body>
</html>
