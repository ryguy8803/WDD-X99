
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="firebase.js"></script>
</head>
<body>
    <header class="logged-out">
        <div>
            <section>          
                <a href="index.html" class="logo-wrapper"><h1>PerfectDate</h1>
                <img src="images/logo.svg" alt="PerfectDate Logo"></a> 
            </section>
            <div class="auth-buttons">
                 <a href="login.html" class="button high">Login</a>
                <a href="register.html" class="button medium">Register</a>
            </div>
        </div>
    </header>
    
    <main class="middle-page">
        <div class="app-container">
            
            <form class="forgot-form" id="forgot-form">

                <h1 class="page-title">Change Password</h1>

                <div class="forgot-div">
                    <label for="newPassword">New Password 
                        <input type="password" id="newPassword" name="newPassword" required>
                    </label>

                    <label for="password">Confirm Password
                        <input type="password" id="password" name="password" required>
                    </label>
                </div>
                
                <div class="forgot-actions">
                    <a class="button medium" href="#" onclick="history.back(); return false;">Cancel</a>
                    <button type="submit" class="button high">Save</button>
                </div>
            </form>

        </div>
    </main>

    <script type="module" src="script/auth.js"></script>

</body>
</html>
